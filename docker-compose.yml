name: distrotask

services:
  # ── Data layer ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: distrotask-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [distrotask-net]

  redis:
    image: redis:7-alpine
    container_name: distrotask-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [distrotask-net]

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: distrotask-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - '5672:5672' # AMQP
      - '${RABBITMQ_MANAGEMENT_PORT:-15672}:15672' # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ['CMD', 'rabbitmq-diagnostics', '-q', 'ping']
      interval: 10s
      timeout: 10s
      retries: 10
    networks: [distrotask-net]

  # ── Application layer ────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: infrastructure/docker/api.Dockerfile
    container_name: distrotask-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
    ports:
      - '3001:3001'
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3001/api/v1/health']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [distrotask-net]

  worker:
    build:
      context: .
      dockerfile: infrastructure/docker/worker.Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      RABBITMQ_URL: ${RABBITMQ_URL}
      API_BASE_URL: http://api:3001
    depends_on:
      api: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:9100/health']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    # Scale horizontally: `docker compose up --scale worker=4`
    deploy:
      replicas: 2
    networks: [distrotask-net]

  web:
    build:
      context: .
      dockerfile: infrastructure/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL}
    container_name: distrotask-web
    restart: unless-stopped
    env_file: .env
    ports:
      - '3000:3000'
    depends_on:
      api: { condition: service_healthy }
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/login']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks: [distrotask-net]

  # ── Observability ─────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: distrotask-prometheus
    restart: unless-stopped
    volumes:
      - ./infrastructure/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - '9090:9090'
    depends_on: [api]
    networks: [distrotask-net]

  grafana:
    image: grafana/grafana:11.3.0
    container_name: distrotask-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./infrastructure/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infrastructure/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - '3030:3000'
    depends_on: [prometheus]
    networks: [distrotask-net]

networks:
  distrotask-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:
