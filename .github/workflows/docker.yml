name: Docker

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}

jobs:
  build:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api, worker, web]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image (no push — validation build for PRs)
        if: github.event_name == 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/${{ matrix.service }}.Dockerfile
          push: false
          tags: distrotask-${{ matrix.service }}:ci-validate
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001/api
            NEXT_PUBLIC_WS_URL=http://localhost:3001/ws

      - name: Validate image starts and exposes its port
        if: github.event_name == 'pull_request' && matrix.service != 'web'
        run: |
          docker run -d --name validate-${{ matrix.service }} \
            -e DATABASE_URL=postgresql://x:x@localhost:5432/x \
            -e REDIS_URL=redis://localhost:6379 \
            -e RABBITMQ_URL=amqp://x:x@localhost:5672 \
            -e API_BASE_URL=http://localhost:3001 \
            -e JWT_SECRET=x -e JWT_REFRESH_SECRET=x -e WORKER_SERVICE_TOKEN=x \
            distrotask-${{ matrix.service }}:ci-validate || true
          sleep 5
          docker logs validate-${{ matrix.service }} || true
          docker rm -f validate-${{ matrix.service }} || true

      - name: Log in to registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: github.event_name == 'push'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha,prefix=

      - name: Build and push
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/${{ matrix.service }}.Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL || 'http://localhost:3001/api' }}
            NEXT_PUBLIC_WS_URL=${{ vars.NEXT_PUBLIC_WS_URL || 'http://localhost:3001/ws' }}
