name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'

jobs:
  install:
    name: Install dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Build shared packages
        run: |
          npm run build --workspace=@distrotask/shared
          npm run build --workspace=@distrotask/rabbitmq

  lint:
    name: Lint
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace=@distrotask/shared
      - run: npm run build --workspace=@distrotask/rabbitmq
      - name: Lint API
        run: npm run lint --workspace=@distrotask/api
        continue-on-error: true
      - name: Lint Web
        run: npm run lint --workspace=@distrotask/web
        continue-on-error: true

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace=@distrotask/shared
      - run: npm run build --workspace=@distrotask/rabbitmq
      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma
      - name: Typecheck shared
        run: npx tsc --noEmit -p packages/shared/tsconfig.json
      - name: Typecheck rabbitmq
        run: npx tsc --noEmit -p packages/rabbitmq/tsconfig.json
      - name: Typecheck worker
        run: npx tsc --noEmit -p apps/worker/tsconfig.json
      - name: Typecheck api
        run: npx tsc --noEmit -p apps/api/tsconfig.json
      - name: Typecheck web
        run: npx tsc --noEmit -p apps/web/tsconfig.json

  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    needs: install
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace=@distrotask/shared
      - run: npm run build --workspace=@distrotask/rabbitmq
      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma
      - name: Test shared
        run: npm test --workspace=@distrotask/shared
      - name: Test worker
        run: npm test --workspace=@distrotask/worker
      - name: Test API (unit)
        run: npm test --workspace=@distrotask/api

  e2e-tests:
    name: E2E tests
    runs-on: ubuntu-latest
    needs: install
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: distrotask
          POSTGRES_PASSWORD: distrotask_test
          POSTGRES_DB: distrotask_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U distrotask -d distrotask_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ['6379:6379']
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      rabbitmq:
        image: rabbitmq:3.13-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: distrotask
          RABBITMQ_DEFAULT_PASS: distrotask_test
        ports: ['5672:5672', '15672:15672']
        options: >-
          --health-cmd "rabbitmq-diagnostics -q ping"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://distrotask:distrotask_test@localhost:5432/distrotask_test?schema=public
      REDIS_URL: redis://localhost:6379
      RABBITMQ_URL: amqp://distrotask:distrotask_test@localhost:5672
      JWT_SECRET: ci_test_jwt_secret_not_for_production
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_SECRET: ci_test_refresh_secret_not_for_production
      JWT_REFRESH_EXPIRES_IN: 7d
      WORKER_SERVICE_TOKEN: ci_test_worker_token_not_for_production
      CORS_ORIGIN: '*'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - run: npm run build --workspace=@distrotask/shared
      - run: npm run build --workspace=@distrotask/rabbitmq
      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma
      - name: Run migrations
        run: npx prisma migrate deploy --schema=prisma/schema.prisma
      - name: Run E2E tests
        run: npm run test:e2e --workspace=@distrotask/api
      - name: Run RabbitMQ integration tests
        run: npm run test:integration --workspace=@distrotask/rabbitmq

  build:
    name: Build all apps
    runs-on: ubuntu-latest
    needs: [lint, typecheck, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
      - run: npm ci
      - name: Generate Prisma client
        run: npx prisma generate --schema=prisma/schema.prisma
      - name: Build shared
        run: npm run build --workspace=@distrotask/shared
      - name: Build rabbitmq
        run: npm run build --workspace=@distrotask/rabbitmq
      - name: Build API
        run: npm run build --workspace=@distrotask/api
      - name: Build Worker
        run: npm run build --workspace=@distrotask/worker
      - name: Build Web
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001/api
          NEXT_PUBLIC_WS_URL: http://localhost:3001/ws
        run: npm run build --workspace=@distrotask/web
