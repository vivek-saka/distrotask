# DistroTask — Nginx reverse proxy
#
# Routes:
#   /            -> Next.js dashboard (web:3000)
#   /api/        -> NestJS API (api:3001)
#   /ws/         -> Socket.IO WebSocket gateway (api:3001, Upgrade-aware)
#
# This file is mounted read-only into an `nginx:alpine` container in a
# production compose override (not the default docker-compose.yml, which
# exposes each service's port directly for local development convenience).

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                   '$status $body_bytes_sent "$http_referer" '
                   '"$http_user_agent" rt=$request_time';
  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log warn;

  sendfile        on;
  tcp_nopush      on;
  tcp_nodelay     on;
  keepalive_timeout 65;
  client_max_body_size 10m;

  # Gzip compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 256;
  gzip_types
    text/plain text/css text/xml text/javascript
    application/json application/javascript application/xml+rss
    application/x-font-ttf font/opentype image/svg+xml;

  # Security headers (applied to every response)
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
  # Strict-Transport-Security is only safe to send once TLS is actually
  # terminated here — it is set in the HTTPS server block below, not
  # globally, so a plain-HTTP local/staging deployment never accidentally
  # forces HTTPS.

  # Rate limiting — mirrors the API's own @Throttle decorators as a second
  # line of defense at the edge, before requests even reach Node.
  limit_req_zone $binary_remote_addr zone=api_general:10m rate=20r/s;
  limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;

  # Reusable proxy headers for every upstream location block.
  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  # Upstreams. Single-instance by default; add more `server` lines here
  # (api2:3001, etc.) to load-balance once running multiple API replicas —
  # see docs/system-design.md for the Socket.IO Redis adapter prerequisite
  # before doing so.
  upstream distrotask_api {
    server api:3001;
    keepalive 32;
  }

  upstream distrotask_web {
    server web:3000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    # In production with a real domain + certificate, uncomment to redirect
    # all plain HTTP to HTTPS instead of serving directly:
    # return 301 https://$host$request_uri;

    # Health check endpoint for the load balancer / orchestrator itself,
    # independent of the upstream API's own /api/v1/health.
    location /healthz {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }

    # WebSocket gateway. Must be matched before the general /api/ block.
    location /ws/ {
      proxy_pass http://distrotask_api/ws/;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 86400s;
      proxy_send_timeout 86400s;
    }

    location /api/v1/auth/ {
      limit_req zone=api_auth burst=10 nodelay;
      proxy_pass http://distrotask_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
      limit_req zone=api_general burst=40 nodelay;
      proxy_pass http://distrotask_api;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Frontend catch-all — must be last.
    location / {
      proxy_pass http://distrotask_web;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
    }
  }

  # HTTPS server template (production). Uncomment and populate once a real
  # certificate is available (certbot, or your cloud provider's managed
  # certificate). Mount the cert files into the container at the paths
  # referenced below (see infrastructure/nginx/ssl/).
  #
  # server {
  #   listen 443 ssl http2;
  #   server_name your-domain.com;
  #
  #   ssl_certificate     /etc/nginx/ssl/fullchain.pem;
  #   ssl_certificate_key /etc/nginx/ssl/privkey.pem;
  #   ssl_protocols       TLSv1.2 TLSv1.3;
  #   ssl_ciphers         HIGH:!aNULL:!MD5;
  #   ssl_prefer_server_ciphers on;
  #   ssl_session_cache   shared:SSL:10m;
  #   ssl_session_timeout 10m;
  #
  #   add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
  #
  #   location /ws/ {
  #     proxy_pass http://distrotask_api/ws/;
  #     proxy_http_version 1.1;
  #     proxy_set_header Upgrade $http_upgrade;
  #     proxy_set_header Connection $connection_upgrade;
  #     proxy_set_header Host $host;
  #     proxy_set_header X-Real-IP $remote_addr;
  #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #     proxy_set_header X-Forwarded-Proto $scheme;
  #     proxy_read_timeout 86400s;
  #     proxy_send_timeout 86400s;
  #   }
  #
  #   location /api/v1/auth/ {
  #     limit_req zone=api_auth burst=10 nodelay;
  #     proxy_pass http://distrotask_api;
  #     proxy_set_header Host $host;
  #     proxy_set_header X-Real-IP $remote_addr;
  #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #     proxy_set_header X-Forwarded-Proto $scheme;
  #   }
  #
  #   location /api/ {
  #     limit_req zone=api_general burst=40 nodelay;
  #     proxy_pass http://distrotask_api;
  #     proxy_set_header Host $host;
  #     proxy_set_header X-Real-IP $remote_addr;
  #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #     proxy_set_header X-Forwarded-Proto $scheme;
  #   }
  #
  #   location / {
  #     proxy_pass http://distrotask_web;
  #     proxy_set_header Host $host;
  #     proxy_set_header X-Real-IP $remote_addr;
  #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  #     proxy_set_header X-Forwarded-Proto $scheme;
  #   }
  # }
}
